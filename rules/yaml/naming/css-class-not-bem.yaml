rule:
  id: naming/css-class-not-bem
  version: 1.0.0
  category: naming
  severity: warning
  description: Detects CSS class names not following BEM convention
  principle: CSS class names follow BEM for predictable structure
  applicable_to: [is_scss, is_style]
  skip_comments: true

  mode: regex
  regex:
    pattern: '^(?!.*&)\s*\.(?![a-z][a-z0-9]*(?:-[a-z0-9]+)*(?:__[a-z0-9]+(?:-[a-z0-9]+)*)?(?:--[a-z0-9]+(?:-[a-z0-9]+)*)?\s*[{,])([a-zA-Z_][a-zA-Z0-9_-]*)\s*[{,]'

  message_template: 'CSS class "{match[1]}" does not follow BEM naming convention'
  fix_complexity: S
