rule:
  id: security/eval-usage-yaml
  version: 1.0.0
  category: security
  severity: error
  description: Detects eval() and new Function() usage
  principle: Dynamic code execution enables injection attacks
  applicable_to: [is_typescript]
  exclude_patterns: ["*.spec.ts", "*.test.ts"]

  mode: ast-grep
  ast_grep:
    pattern: "eval($$$)"

  message_template: "eval() is a security risk. Use safer alternatives."
  fix_complexity: M
