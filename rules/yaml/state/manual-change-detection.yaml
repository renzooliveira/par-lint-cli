rule:
  id: state/manual-change-detection
  version: 1.0.0
  category: state
  severity: warning
  description: Detects manual ChangeDetectorRef calls indicating broken state model
  principle: Manual change detection indicates broken state model — prefer signals/computed
  applicable_to: [is_component, is_typescript]

  mode: regex
  regex:
    pattern: '\.(detectChanges|markForCheck)\s*\(\s*\)'

  message_template: "Manual change detection: {match[0]}. Indicates broken state model — prefer signals/computed."
  fix_complexity: M
