rule:
  id: test/poor-test-naming
  version: 1.0.0
  category: test
  severity: info
  description: Detects generic test names like "should work" or "test"
  principle: Descriptive test names serve as documentation and simplify debugging
  applicable_to: [is_test, is_spec]

  mode: regex
  regex:
    pattern: '^\s*(it|test)\s*\(\s*[''"`](should work|test|works|it works|does something|todo|fix me|default|placeholder)[''"`]'

  message_template: "Generic test name. Use a descriptive name that explains what is being tested."
  fix_complexity: L
