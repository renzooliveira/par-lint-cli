rule:
  id: test/always-true-assertion
  version: 1.0.0
  category: test
  severity: error
  description: Detects tautological assertions like expect(true).toBe(true)
  principle: Tests must verify actual behavior, not hardcoded truths
  applicable_to: [is_test, is_spec]

  mode: regex
  regex:
    pattern: 'expect\s*\(\s*true\s*\)\s*\.\s*toBe\s*\(\s*true\s*\)|expect\s*\(\s*true\s*\)\s*\.\s*toEqual\s*\(\s*true\s*\)|expect\s*\(\s*false\s*\)\s*\.\s*toBe\s*\(\s*false\s*\)|expect\s*\(\s*false\s*\)\s*\.\s*toEqual\s*\(\s*false\s*\)|expect\s*\(\s*1\s*\)\s*\.\s*toBeTruthy\s*\(\s*\)|expect\s*\(\s*0\s*\)\s*\.\s*toBeFalsy\s*\(\s*\)'

  message_template: "Tautological assertion. This test will always pass without verifying behavior."
  fix_complexity: L
