rule:
  id: fp/enum-instead-of-const
  version: 1.0.0
  category: fp
  severity: info
  description: Detects enum usage instead of as const object
  principle: as const objects are more type-safe and tree-shakeable than enums
  applicable_to: [is_typescript]
  exclude_patterns: ["*.spec.ts", "*.test.ts"]

  mode: regex
  regex:
    pattern: '^\s*(?:export\s+)?enum\s+(\w+)'
    capture_group: 1

  message_template: 'Enum "{match[1]}" could be replaced with "as const" object for better tree-shaking.'
  fix_complexity: L
