rule:
  id: scss/component-style-leak
  version: 1.0.0
  category: scss
  severity: warning
  description: Detects ::ng-deep usage that leaks component styles globally
  principle: Component styles must not leak to other components
  applicable_to: [is_scss, is_style]

  mode: regex
  regex:
    pattern: '::ng-deep'
    multi_match: true

  message_template: "::ng-deep breaks style encapsulation. Use component-scoped selectors or CSS custom properties."
  fix_complexity: M
