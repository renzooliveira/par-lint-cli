<div class="container">
  <header>
    <h1>Title</h1>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h2>Hero Section</h2>
      <p>Description text goes here.</p>
    </section>
    <section class="content">
      <div class="card" *ngFor="let item of items">
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
        <button (click)="onAction(item)">Action</button>
      </div>
    </section>
    <section class="sidebar">
      <div class="widget">
        <h4>Widget 1</h4>
        <p>Widget content</p>
      </div>
      <div class="widget">
        <h4>Widget 2</h4>
        <p>Widget content</p>
      </div>
    </section>
  </main>
  <footer>
    <p>Footer content</p>
  </footer>
